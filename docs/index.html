<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tiny-py — Tiny ERP Python SDK</title>
    <meta
      name="description"
      content="Production-grade Python SDK for the Tiny ERP API v2."
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    />
    <style>
      :root {
        --theme-color: #2d6cdf;
        --sidebar-width: 280px;
      }
      .sidebar-nav li > a {
        font-size: 0.93rem;
      }
      .sidebar-nav li ul {
        padding-left: 1rem;
      }
      .app-name-link img {
        width: 32px;
        vertical-align: middle;
        margin-right: 6px;
      }
      .markdown-section code {
        font-size: 0.88em;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script>
      window.$docsify = {
        name: "tiny-py",
        repo: "",
        loadSidebar: true,
        subMaxLevel: 3,
        auto2top: true,
        homepage: "README.md",
        search: {
          maxAge: 86400000,
          paths: "auto",
          placeholder: "Search docs...",
          noData: "No results.",
          depth: 4,
          hideOtherSidebarContent: false,
        },
        copyCode: {
          buttonText: "Copy",
          errorText: "Error",
          successText: "Copied!",
        },
        tabs: {
          persist: true,
          sync: true,
          theme: "classic",
        },
        pagination: {
          previousText: "← Previous",
          nextText: "Next →",
          crossChapter: true,
          crossChapterText: true,
        },
        alias: {
          "/.*/_sidebar.md": "/_sidebar.md",
        },
      };
    </script>

    <!-- Docsify core -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

    <!-- Plugins -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1/dist/docsify-tabs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>

    <!-- Syntax highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-toml.min.js"></script>
  </body>
</html>
